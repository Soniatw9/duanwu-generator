<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon Boat Festival Card Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght=600;900&family=Noto+Sans+TC:wght=400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-dark: #0A1626;
            --bg-card: #16263D;
            --gold-light: #F6D785;
            --gold-dark: #C9A55C;
            --text-light: #E2E8F0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #050b14;
            color: var(--text-light);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 左側控制欄 */
        .sidebar {
            width: 360px;
            min-width: 360px;
            background-color: var(--bg-card);
            padding: 25px;
            box-shadow: 4px 0 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            border-right: 1px solid rgba(197, 160, 89, 0.3);
            z-index: 10;
        }

        .sidebar h2 {
            font-family: 'Noto Serif TC', serif;
            color: var(--gold-light);
            font-size: 1.3rem;
            border-bottom: 2px solid var(--gold-dark);
            padding-bottom: 10px;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 0.9rem;
            color: var(--gold-light);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .input-group input, .input-group textarea {
            background-color: var(--bg-dark);
            border: 1px solid rgba(197, 160, 89, 0.4);
            border-radius: 6px;
            padding: 10px;
            color: #fff;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .input-group input:focus, .input-group textarea:focus {
            border-color: var(--gold-light);
            outline: none;
            box-shadow: 0 0 8px rgba(243, 209, 126, 0.3);
        }

        /* 龍舟選擇 */
        .boat-selector-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .boat-selector-title {
            font-size: 0.95rem;
            color: var(--gold-light);
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        .boat-options-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        
        .boat-option {
            background-color: #0A1626;
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .boat-option:hover {
            border-color: rgba(197, 160, 89, 0.4);
        }
        
        .boat-option.selected {
            border-color: var(--gold-dark);
            background-color: #1a2f4a;
        }
        
        .boat-option img {
            width: 100%;
            height: auto;
            opacity: 0.7;
        }
        
        .boat-option.selected img {
            opacity: 1;
        }

        .btn-download {
            background: linear-gradient(135deg, var(--gold-dark), var(--gold-light));
            color: var(--bg-dark);
            border: none;
            border-radius: 6px;
            padding: 14px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            margin-top: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* 右側預覽區 */
        .preview-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-dark);
            padding: 30px;
            overflow: auto;
        }

        .canvas-wrapper {
            width: 600px;
            max-width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 畫布本體 - 嚴格 1:1 分配 */
        #poster-canvas {
            width: 600px;
            height: 600px;
            aspect-ratio: 1 / 1;
            background: radial-gradient(circle at center, #122846 0%, #061224 100%);
            border: 12px double var(--gold-dark);
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 50px 40px;
            overflow: hidden;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        #poster-canvas::before {
            content: "";
            position: absolute;
            top: 15px; left: 15px; right: 15px; bottom: 15px;
            border: 1px solid rgba(246, 215, 133, 0.2);
            pointer-events: none;
        }

        .header-section {
            text-align: center;
            width: 100%;
            z-index: 2;
        }

        .display-recipient {
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 1.25rem;
            color: var(--gold-light);
            margin-bottom: 12px;
            letter-spacing: 2px;
            font-weight: 500;
        }

        .display-subtitle {
            font-size: 1.05rem;
            color: #BACADF;
            letter-spacing: 3px;
            line-height: 1.6;
            max-width: 90%;
            margin: 0 auto;
        }

        .middle-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            z-index: 2;
        }

        .svg-core-container {
            width: 100%;
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #dynamic-dragon-boat {
            width: 100%;
            max-width: 290px;
            height: auto;
            filter: drop-shadow(0 0 12px rgba(246, 215, 133, 0.85));
        }

        .display-main-title {
            font-family: 'Noto Serif TC', serif;
            font-size: 2.8rem;
            font-weight: 900;
            color: var(--gold-light);
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.6), 0 0 15px rgba(246, 215, 211, 0.2);
            letter-spacing: 12px;
            padding-left: 12px;
            margin-top: 5px;
            text-align: center;
        }

        .footer-section {
            text-align: center;
            width: 100%;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .display-sender {
            font-size: 1.15rem;
            color: var(--gold-light);
            letter-spacing: 3px;
        }

        .display-logo-text {
            font-size: 0.6rem; 
            color: rgba(186, 202, 223, 0.6);
            letter-spacing: 1.5px; 
            text-transform: uppercase; 
            line-height: 1.4; 
        }

        .cloud {
            position: absolute;
            opacity: 0.12;
            pointer-events: none;
        }
        .cloud-left { top: 35%; left: 25px; width: 90px; }
        .cloud-right { top: 32%; right: 25px; width: 90px; transform: scaleX(-1); }

        #company-logo {
            position: absolute; 
            bottom: 22px;       
            right: 22px;        
            width: 70px;       
            height: auto;       
            z-index: 10;        
            opacity: 0.85;       
        }

        /* 📱 手機版 RWD 彈性高度優化，解決塞不下的問題 */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
                height: 100vh;
                overflow: hidden;
            }

            .sidebar {
                width: 100%;
                min-width: 100%;
                flex: 1; /* 上半部表單佔 50% */
                height: 50vh;
                border-right: none;
                border-bottom: 2px solid rgba(197, 160, 89, 0.3);
                padding: 15px;
                gap: 15px;
            }

            .sidebar h2 { font-size: 1.1rem; padding-bottom: 5px; }
            .input-group { gap: 4px; }
            .input-group input, .input-group textarea { padding: 8px; font-size: 0.9rem; }

            .preview-container {
                width: 100%;
                flex: 1; /* 下半部預覽區佔 50% */
                height: 50vh;
                padding: 10px;
                background-color: #03070d;
                overflow: auto; /* 允許獨立滾動不影響表單 */
                align-items: center;
            }

            .canvas-wrapper {
                width: 100%;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            #poster-canvas {
                width: 600px !important;
                height: 600px !important;
                transform-origin: center center;
            }
        }

        /* 📥 手機端長按儲存彈出視窗（燈箱） */
        .mobile-share-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(5, 11, 20, 0.95);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .mobile-share-overlay.active {
            opacity: 1; pointer-events: auto;
        }
        .mobile-share-tip {
            color: var(--gold-light);
            font-size: 1.1rem;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 500;
            animation: pulse 1.5s infinite;
        }
        .mobile-share-image {
            max-width: 100%;
            max-height: 70vh;
            border: 4px solid var(--gold-dark);
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
        }
        .mobile-share-close {
            margin-top: 20px;
            background: #16263D;
            border: 1px solid var(--gold-dark);
            color: #fff;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Card Generator</h2>
        
        <div class="input-group">
            <label for="input-recipient">Recipient</label>
            <input type="text" id="input-recipient" value="親愛的合作夥伴與客戶：">
        </div>

        <div class="input-group">
            <label for="input-subtitle">Subtitle / Message</label>
            <textarea id="input-subtitle" rows="2" style="resize: none;">端午臨仲夏，時清日復長。&#13;感謝您長期的支持與陪伴，願您佳節平安。</textarea>
        </div>

        <div class="boat-selector-section">
            <div class="boat-selector-title">Select Dragon Boat Style</div>
            <div class="boat-options-grid" id="boat-options">
                <div class="boat-option selected" data-boat-id="1">
                    <img src="./dragon-boat/dragon-boat-1.png" alt="Boat Style 1">
                </div>
                <div class="boat-option" data-boat-id="2">
                    <img src="./dragon-boat/dragon-boat-2.png" alt="Boat Style 2">
                </div>
                <div class="boat-option" data-boat-id="3">
                    <img src="./dragon-boat/dragon-boat-3.png" alt="Boat Style 3">
                </div>
                <div class="boat-option" data-boat-id="4">
                    <img src="./dragon-boat/dragon-boat-4.png" alt="Boat Style 4">
                </div>
            </div>
        </div>

        <div class="input-group">
            <label for="input-main-title">Main Title (5 Characters)</label>
            <input type="text" id="input-main-title" value="端午節快樂" maxlength="10">
        </div>

        <div class="input-group">
            <label for="input-sender">Sender Signature</label>
            <input type="text" id="input-sender" value="FortVax Sonia 敬賀">
        </div>

        <div class="input-group">
            <label for="input-logo-text">Footer Text / Declaration</label>
            <textarea id="input-logo-text" rows="2" style="resize: none;">FORTVAX AI — ENTERPRISE AI SOLUTION MANUFACTURER&#13;UNDER TAIWAN NUMERICAL POWERS CO., LTD. (6593)</textarea>
        </div>

        <button class="btn-download" onclick="downloadPoster()">💾 Download PNG</button>
    </div>

    <div class="preview-container">
        <div class="canvas-wrapper" id="canvas-scaler-box">
            <div id="poster-canvas">
                
                <svg class="cloud cloud-left" viewBox="0 0 100 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10 40 C 10 25, 30 25, 35 30 C 40 15, 65 15, 70 30 C 85 20, 95 35, 85 45 C 95 55, 60 60, 50 50 C 30 60, 10 50, 10 40 Z" stroke="#C9A55C" stroke-width="1.5"/>
                    <path d="M20 45 C 25 38, 45 38, 50 45" stroke="#C9A55C" stroke-width="1"/>
                </svg>
                <svg class="cloud cloud-right" viewBox="0 0 100 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10 40 C 10 25, 30 25, 35 30 C 40 15, 65 15, 70 30 C 85 20, 95 35, 85 45 C 95 55, 60 60, 50 50 C 30 60, 10 50, 10 40 Z" stroke="#C9A55C" stroke-width="1.5"/>
                    <path d="M20 45 C 25 38, 45 38, 50 45" stroke="#C9A55C" stroke-width="1"/>
                </svg>

                <div class="header-section">
                    <div class="display-recipient" id="target-recipient">親愛的合作夥伴與客戶：</div>
                    <div class="display-subtitle" id="target-subtitle">端午臨仲夏，時清日復長。<br>感謝您長期的支持與陪伴，願您佳節平安。</div>
                </div>

                <div class="middle-section">
                    <div class="svg-core-container">
                        <img id="dynamic-dragon-boat" src="./dragon-boat/dragon-boat-1.png" alt="Selected Dragon Boat">
                    </div>
                    <div class="display-main-title" id="target-main-title">端午節快樂</div>
                </div>

                <div class="footer-section">
                    <div class="display-sender" id="target-sender">FortVax Sonia 敬賀</div>
                    <div class="display-logo-text" id="target-logo-text">FORTVAX AI — ENTERPRISE AI SOLUTION MANUFACTURER<br>UNDER TAIWAN NUMERICAL POWERS CO., LTD. (6593)</div>
                </div>

                <img id="company-logo" src="./logo.png" alt="FortVax Logo">

            </div>
        </div>
    </div>

    <div class="mobile-share-overlay" id="mobileOverlay">
        <div class="mobile-share-tip">💡 賀圖已生成！請「長按圖片」選擇儲存至相簿</div>
        <img class="mobile-share-image" id="mobileGeneratedImg" src="" alt="Generated Card">
        <button class="mobile-share-close" onclick="closeOverlay()">返回修改</button>
    </div>

    <script>
        const inputs = {
            recipient: document.getElementById('input-recipient'),
            subtitle: document.getElementById('input-subtitle'),
            mainTitle: document.getElementById('input-main-title'),
            sender: document.getElementById('input-sender'),
            logoText: document.getElementById('input-logo-text')
        };

        const targets = {
            recipient: document.getElementById('target-recipient'),
            subtitle: document.getElementById('target-subtitle'),
            boat: document.getElementById('dynamic-dragon-boat'),
            mainTitle: document.getElementById('target-main-title'),
            sender: document.getElementById('target-sender'),
            logoText: document.getElementById('target-logo-text')
        };

        /* 即時預覽同步 */
        inputs.recipient.addEventListener('input', (e) => targets.recipient.innerText = e.target.value);
        inputs.sender.addEventListener('input', (e) => targets.sender.innerText = e.target.value);
        inputs.mainTitle.addEventListener('input', (e) => targets.mainTitle.innerText = e.target.value);
        inputs.subtitle.addEventListener('input', (e) => {
            targets.subtitle.innerHTML = e.target.value.replace(/\n/g, '<br>');
        });
        inputs.logoText.addEventListener('input', (e) => {
            targets.logoText.innerHTML = e.target.value.replace(/\n/g, '<br>');
        });
        
        /* 龍舟選擇 */
        const boatOptions = document.querySelectorAll('.boat-option');
        boatOptions.forEach(option => {
            option.addEventListener('click', () => {
                boatOptions.forEach(opt => opt.classList.remove('selected'));
                option.classList.add('selected');
                const boatId = option.getAttribute('data-boat-id');
                targets.boat.src = `./dragon-boat/dragon-boat-${boatId}.png`;
            });
        });

        /* 手機端動態等比例縮放畫布 */
        function handleMobileScale() {
            const wrapper = document.getElementById('canvas-scaler-box');
            const canvas = document.getElementById('poster-canvas');
            if (window.innerWidth <= 768) {
                const availableWidth = wrapper.offsetWidth;
                const scaleFactor = availableWidth / 600; 
                canvas.style.transform = `scale(${scaleFactor})`;
            } else {
                canvas.style.transform = 'none';
            }
        }
        window.addEventListener('resize', handleMobileScale);
        window.addEventListener('DOMContentLoaded', handleMobileScale);
        window.addEventListener('load', handleMobileScale);

        function closeOverlay() {
            document.getElementById('mobileOverlay').classList.remove('active');
        }

        /* 匯出下載功能大改版 */
        function downloadPoster() {
            const poster = document.getElementById('poster-canvas');
            const btn = document.querySelector('.btn-download');
            btn.innerText = "⏳ Generating Image...";
            btn.disabled = true;

            // 確保匯出時無縮放變形
            const currentTransform = poster.style.transform;
            poster.style.transform = 'none';

            // 稍微延遲讓 DOM 渲染完全，保障 html2canvas 擷取精準
            setTimeout(() => {
                html2canvas(poster, {
                    scale: 2, 
                    useCORS: true,
                    backgroundColor: null,
                    logging: false
                }).then(canvas => {
                    // 還原縮放
                    if (window.innerWidth <= 768) {
                        handleMobileScale();
                    } else {
                        poster.style.transform = currentTransform;
                    }

                    const imgData = canvas.toDataURL('image/png');
                    const senderName = inputs.sender.value.split(' ')[1] || inputs.sender.value.split(' ')[0] || 'FortVax';

                    // 判斷是否為手機端 (或者是 LINE / 微信等內建瀏覽器)
                    const isMobile = window.innerWidth <= 768 || /Android|iPhone|iPad|iPod|LINE/i.test(navigator.userAgent);

                    if (isMobile) {
                        // 手機端：跳出長按存圖燈箱
                        const overlay = document.getElementById('mobileOverlay');
                        const mobileImg = document.getElementById('mobileGeneratedImg');
                        mobileImg.src = imgData;
                        overlay.classList.add('active');
                    } else {
                        // 電腦端：直接下載
                        const link = document.createElement('a');
                        link.download = `${senderName}_Card.png`;
                        link.href = imgData;
                        link.click();
                    }
                    
                    btn.innerText = "💾 Download PNG";
                    btn.disabled = false;
                }).catch(err => {
                    console.error(err);
                    if (window.innerWidth <= 768) handleMobileScale();
                    btn.innerText = "❌ Error, please try again";
                    btn.disabled = false;
                });
            }, 100);
        }
    </script>
</body>
</html>
