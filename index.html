<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Boat Festival Card Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-dark: #0A1626;
            --bg-card: #16263D;
            --gold-light: #F6D785;
            --gold-dark: #C9A55C;
            --text-light: #E2E8F0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #050b14;
            color: var(--text-light);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 左側控制欄 */
        .sidebar {
            width: 360px;
            background-color: var(--bg-card);
            padding: 25px;
            box-shadow: 4px 0 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            border-right: 1px solid rgba(197, 160, 89, 0.3);
            z-index: 10;
        }

        .sidebar h2 {
            font-family: 'Noto Serif TC', serif;
            color: var(--gold-light);
            font-size: 1.3rem;
            border-bottom: 2px solid var(--gold-dark);
            padding-bottom: 10px;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 0.9rem;
            color: var(--gold-light);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .input-group input, .input-group textarea {
            background-color: var(--bg-dark);
            border: 1px solid rgba(197, 160, 89, 0.4);
            border-radius: 6px;
            padding: 10px;
            color: #fff;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .input-group input:focus, .input-group textarea:focus {
            border-color: var(--gold-light);
            outline: none;
            box-shadow: 0 0 8px rgba(243, 209, 126, 0.3);
        }

        .btn-download {
            background: linear-gradient(135deg, var(--gold-dark), var(--gold-light));
            color: var(--bg-dark);
            border: none;
            border-radius: 6px;
            padding: 14px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            margin-top: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .btn-download:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        /* 右側預覽區 */
        .preview-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-dark);
            padding: 20px;
            overflow: auto;
        }

        /* 賀圖畫布 - 1:1 黃金比例 */
        #poster-canvas {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle at center, #122846 0%, #061224 100%);
            border: 12px double var(--gold-dark);
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 55px 45px;
            overflow: hidden;
        }

        /* 內框裝飾細線 */
        #poster-canvas::before {
            content: "";
            position: absolute;
            top: 15px; left: 15px; right: 15px; bottom: 15px;
            border: 1px solid rgba(246, 215, 133, 0.2);
            pointer-events: none;
        }

        /* 上部結構：收件人與副標題 */
        .header-section {
            text-align: center;
            width: 100%;
            z-index: 2;
        }

        .display-recipient {
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 1.25rem;
            color: var(--gold-light);
            margin-bottom: 15px;
            letter-spacing: 2px;
            font-weight: 500;
        }

        .display-subtitle {
            font-size: 1.05rem;
            color: #BACADF;
            letter-spacing: 4px;
            line-height: 1.7;
            max-width: 85%;
            margin: 0 auto;
        }

        /* 中部結構：插圖與核心主標題 */
        .middle-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            z-index: 2;
        }

        .svg-core-container {
            width: 420px;
            height: 250px;
        }

        /* 下部結構：寄件人與底部標誌 */
        .footer-section {
            text-align: center;
            width: 100%;
            z-index: 2;
        }

        .display-sender {
            font-size: 1.15rem;
            color: var(--gold-light);
            letter-spacing: 3px;
            margin-bottom: 12px;
        }

        /* 優化後的底部宣告文字樣式 */
        .display-logo-text {
            font-size: 0.65rem; /* 稍微縮小字體以容納較長的英文 */
            color: rgba(186, 202, 223, 0.55);
            letter-spacing: 1.5px; /* 縮小字距確保不折行 */
            text-transform: uppercase; /* 全部轉換為大寫更具專業感 */
        }

        /* 傳統祥雲背景裝飾 */
        .cloud {
            position: absolute;
            opacity: 0.12;
            pointer-events: none;
        }
        .cloud-left { top: 35%; left: 25px; width: 90px; }
        .cloud-right { top: 32%; right: 25px; width: 90px; transform: scaleX(-1); }

        /* FortVax Logo 樣式設定 */
        #company-logo {
            position: absolute; 
            bottom: 30px;       
            right: 35px;        
            width: 110px;       
            height: auto;       
            z-index: 10;        
            opacity: 0.9;       
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Card Generator</h2>
        
        <div class="input-group">
            <label for="input-recipient">Recipient</label>
            <input type="text" id="input-recipient" value="親愛的合作夥伴與客戶：">
        </div>

        <div class="input-group">
            <label for="input-subtitle">Subtitle / Message</label>
            <textarea id="input-subtitle" rows="2" style="resize: none;">端午臨仲夏，時清日復長。&#13;感謝您長期的支持與陪伴，願您佳節平安。</textarea>
        </div>

        <div class="input-group">
            <label for="input-title">Main Title (Max 6 chars)</label>
            <input type="text" id="input-title" value="端午安康" maxlength="6">
        </div>

        <div class="input-group">
            <label for="input-sender">Sender Signature</label>
            <input type="text" id="input-sender" value="FortVax Sonia 敬賀">
        </div>

        <div class="input-group">
            <label for="input-logo-text">Footer Text / Declaration</label>
            <input type="text" id="input-logo-text" value="FortVax under Taiwan Numerical Powers Co., Ltd. (Stock Code: 7781)">
        </div>

        <button class="btn-download" onclick="downloadPoster()">💾 Download PNG</button>
    </div>

    <div class="preview-container">
        <div id="poster-canvas">
            
            <svg class="cloud cloud-left" viewBox="0 0 100 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M10 40 C 10 25, 30 25, 35 30 C 40 15, 65 15, 70 30 C 85 20, 95 35, 85 45 C 95 55, 60 60, 50 50 C 30 60, 10 50, 10 40 Z" stroke="#C9A55C" stroke-width="1.5"/>
                <path d="M20 45 C 25 38, 45 38, 50 45" stroke="#C9A55C" stroke-width="1"/>
            </svg>
            <svg class="cloud cloud-right" viewBox="0 0 100 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M10 40 C 10 25, 30 25, 35 30 C 40 15, 65 15, 70 30 C 85 20, 95 35, 85 45 C 95 55, 60 60, 50 50 C 30 60, 10 50, 10 40 Z" stroke="#C9A55C" stroke-width="1.5"/>
                <path d="M20 45 C 25 38, 45 38, 50 45" stroke="#C9A55C" stroke-width="1"/>
            </svg>

            <div class="header-section">
                <div class="display-recipient" id="target-recipient">親愛的合作夥伴與客戶：</div>
                <div class="display-subtitle" id="target-subtitle">端午臨仲夏，時清日復長。<br>感謝您長期的支持與陪伴，願您佳節平安。</div>
            </div>

            <div class="middle-section">
                <div class="svg-core-container">
                    <svg viewBox="0 0 400 240" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="goldTextGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" stop-color="#FFFFFF" />
                                <stop offset="35%" stop-color="#FFF2B2" />
                                <stop offset="70%" stop-color="#E5BA6E" />
                                <stop offset="100%" stop-color="#9E773B" />
                            </linearGradient>
                            <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
                                <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.6"/>
                            </filter>
                        </defs>

                        <g transform="translate(100, 15)">
                            <polygon points="100,15 65,70 135,70" fill="none" stroke="#C9A55C" stroke-width="1.5" stroke-dasharray="2,2" opacity="0.6"/>
                            <polygon points="100,22 73,72 122,77" fill="#16263D" stroke="#F6D785" stroke-width="2"/>
                            <line x1="100" y1="22" x2="96" y2="74" stroke="#F6D785" stroke-width="1.5"/>
                            <path d="M 87,51 Q 100,54 110,49" fill="none" stroke="#F6D785" stroke-width="1.5"/>
                            <path d="M 85,55 Q 100,58 111,53" fill="none" stroke="#F6D785" stroke-width="1.5"/>
                            
                            <path d="M15,75 C 50,83 150,83 185,75 C 170,93 30,93 15,75 Z" fill="#C9A55C" opacity="0.25"/>
                            <path d="M 10,75 Q 100,93 190,75" fill="none" stroke="#F6D785" stroke-width="2.5"/>
                            <path d="M 190,75 Q 197,66 194,57 Q 188,63 183,72" fill="none" stroke="#F6D785" stroke-width="2"/>
                            <path d="M 10,75 Q 3,69 5,62 Q 10,66 14,72" fill="none" stroke="#F6D785" stroke-width="2"/>
                            <path d="M 35,88 Q 50,92 65,88 M 135,88 Q 150,92 165,88" fill="none" stroke="#C9A55C" stroke-width="1"/>
                        </g>

                        <text x="200" y="185" 
                              font-family="'Noto Serif TC', 'Noto Serif CJK TC', serif" 
                              font-weight="900" 
                              font-size="46" 
                              fill="url(#goldTextGradient)" 
                              text-anchor="middle" 
                              letter-spacing="12"
                              filter="url(#shadow)"
                              id="target-title">端午安康</text>
                    </svg>
                </div>
            </div>

            <div class="footer-section">
                <div class="display-sender" id="target-sender">FortVax Sonia 敬賀</div>
                <div class="display-logo-text" id="target-logo-text">FORTVAX UNDER TAIWAN NUMERICAL POWERS CO., LTD. (STOCK CODE: 7781)</div>
            </div>

            <img id="company-logo" src="./logo.png" alt="FortVax Logo">

        </div>
    </div>

    <script>
        const inputs = {
            recipient: document.getElementById('input-recipient'),
            subtitle: document.getElementById('input-subtitle'),
            title: document.getElementById('input-title'),
            sender: document.getElementById('input-sender'),
            logoText: document.getElementById('input-logo-text')
        };

        const targets = {
            recipient: document.getElementById('target-recipient'),
            subtitle: document.getElementById('target-subtitle'),
            title: document.getElementById('target-title'),
            sender: document.getElementById('target-sender'),
            logoText: document.getElementById('target-logo-text')
        };

        // 即時預覽同步
        inputs.recipient.addEventListener('input', (e) => targets.recipient.innerText = e.target.value);
        inputs.sender.addEventListener('input', (e) => targets.sender.innerText = e.target.value);
        inputs.logoText.addEventListener('input', (e) => targets.logoText.innerText = e.target.value);
        inputs.subtitle.addEventListener('input', (e) => {
            targets.subtitle.innerHTML = e.target.value.replace(/\n/g, '<br>');
        });
        
        // 同步主標題 (處理 SVG text)
        inputs.title.addEventListener('input', (e) => {
            targets.title.textContent = e.target.value;
        });

        // 高清圖片導出功能
        function downloadPoster() {
            const poster = document.getElementById('poster-canvas');
            
            // 下載時顯示提示，防呆處理
            const btn = document.querySelector('.btn-download');
            btn.innerText = "⏳ Generating Image...";
            btn.disabled = true;

            html2canvas(poster, {
                scale: 2, // 放大兩倍輸出，確保高清
                useCORS: true,
                backgroundColor: null,
                logging: false
            }).then(canvas => {
                const link = document.createElement('a');
                const fileName = inputs.title.value.trim() || 'Greeting';
                link.download = `${fileName}_Card.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                // 還原按鈕狀態
                btn.innerText = "💾 Download PNG";
                btn.disabled = false;
            }).catch(err => {
                console.error(err);
                btn.innerText = "❌ Error, please try again";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
